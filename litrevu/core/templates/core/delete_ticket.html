{% extends 'base.html' %}

{% block content %}

    <div class="base-block items-center">
        <h2 class="crud-title">Supprimer votre billet</h2>
        <p class="font-semibold">Êtes-vous sûr de vouloir supprimer ce billet ?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="delete-button mt-4">Supprimer</button>
        </form>
        <a href="{% url "personal_posts" %}" class="btn btn-outline mt-4">Annuler</a>
    </div>

{% endblock content %}
