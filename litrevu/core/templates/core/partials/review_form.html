<div class="mb-8">
    <label class="font-semibold" for="{{ review_form.headline.id_for_label }}">
        {{ review_form.headline.label }}
    </label>
    {{ review_form.headline }}
</div>

<div class="mb-8 flex flex-col gap-2">
    <label class="font-semibold">Note</label>
    <div class="rating rating-lg">
        {% for radio in review_form.rating %}
            <input 
                type="radio" 
                name="{{ radio.data.name }}" 
                value="{{ radio.data.value }}" 
                class="mask mask-star"
                {% if radio.data.selected %}checked{% endif %}
                aria-label="{{ radio.choice_label }}"
            />
        {% endfor %}
    </div>
</div>

<div class="mb-8">
    <label class="font-semibold" for="{{ review_form.body.id_for_label }}">
        {{ review_form.body.label }}
    </label>
    {{ review_form.body }}
</div>
