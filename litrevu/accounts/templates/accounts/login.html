{% extends 'base.html' %}

{% block content %}

    {% if  messages %}
        {% for message in messages %}
        <div class="flex justify-center">
            <div class="alert alert-{{ message.tags }} alert-soft mt-8 inline-block">
                {{ message }}
            </div>
        </div>
        {% endfor %}
    {% endif %}

    <div class="base-block items-center gap-8 md:flex-row md:justify-center md:gap-24">
        <div class="flex flex-col items-center">
            <h2 class="mb-4">Inscrivez-vous maintenant</h1>
            <a href="{% url 'signup' %}" class="btn btn-soft">S'inscrire</a>
        </div>

        <div class="md:w-auto md:text-left text-center">
            <h2 class="mb-3">Connectez-vous</h2>
            <form method="post" class="md:text-center">
                {{ form.as_p }}
                {% csrf_token %}
                <button type="submit" class="btn btn-soft mt-1">Se connecter</button>
            </form>
        </div>
    </div>

{% endblock content %}
