{% extends 'base.html' %}
{% load static %}

{% block content %}

    {% block js %}
        {{ block.super }}
        <script src="{% static 'js/password-toggle.js' %}" defer></script>
    {% endblock %}

    <div class="base-block items-center md:mt-32">
    <h2 class="mb-3">Inscrivez-vous</h2>
            <form method="post" class="text-center">
                {{ form.as_p }}
                {% csrf_token %}
                <button type="submit" class="btn btn-soft mt-4 mb-2">S'inscrire</button>
            </form>
        <a href="{% url 'feed'%}" class="btn btn-outline">Retour</a>
    </div>

{% endblock content %}
