{% extends 'base.html' %}

{% block content %}

    <div class="base-block items-center">
    <h2 class="mb-3">Inscrivez-vous</h2>

                {{ form.as_p }}

        <a href="{% url 'feed'%}" class="btn btn-outline">Retour</a>
    </div>

{% endblock content %}
